name: Build ONCE Triplex Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build web app
        run: bun run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Replace Android app icons
        run: |
          unzip -o public/icon_pack.zip -d public/icon_pack_temp
          MIPMAP_DIR=$(find public/icon_pack_temp -type d -name "mipmap-hdpi" -print -quit)
          if [ -n "$MIPMAP_DIR" ]; then
            MIPMAP_PARENT=$(dirname "$MIPMAP_DIR")
            rm -rf android/app/src/main/res/mipmap-*
            cp -r "$MIPMAP_PARENT"/mipmap-* android/app/src/main/res/
            for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
              DIR="android/app/src/main/res/mipmap-$density"
              if [ -d "$DIR" ]; then
                if [ ! -f "$DIR/ic_launcher.png" ]; then
                  ICON=$(find "$DIR" -name "*.png" ! -name "*_round*" ! -name "*_foreground*" ! -name "*_background*" -print -quit)
                  [ -n "$ICON" ] && cp "$ICON" "$DIR/ic_launcher.png"
                fi
                if [ ! -f "$DIR/ic_launcher_round.png" ] && [ -f "$DIR/ic_launcher.png" ]; then
                  cp "$DIR/ic_launcher.png" "$DIR/ic_launcher_round.png"
                fi
              fi
            done
          else
            echo "ERROR: No mipmap folders found in ZIP"
            exit 1
          fi
          rm -rf public/icon_pack_temp

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Set Gradle wrapper permissions
        run: chmod +x android/gradlew

      - name: Decode release keystore
        if: github.event_name != 'pull_request' && env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > $RUNNER_TEMP/once-triplex-release.p12
          echo "KEYSTORE_PATH=$RUNNER_TEMP/once-triplex-release.p12" >> $GITHUB_ENV

      - name: Inject release signing config into build.gradle
        if: env.KEYSTORE_PATH != ''
        run: |
          cat >> android/app/build.gradle <<'GRADLE'

          android {
              signingConfigs {
                  release {
                      storeFile file(System.getenv('KEYSTORE_PATH'))
                      storeType 'PKCS12'
                      storePassword System.getenv('KEYSTORE_PASSWORD')
                      keyAlias System.getenv('KEY_ALIAS')
                      keyPassword System.getenv('KEY_PASSWORD')
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }
              }
              defaultConfig {
                  versionCode Integer.parseInt(System.getenv('VERSION_CODE') ?: '1')
                  versionName System.getenv('VERSION_NAME') ?: '1.0'
              }
          }
          GRADLE

      - name: Build release APK + AAB
        if: env.KEYSTORE_PATH != ''
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: 1.0.${{ github.run_number }}
        run: ./gradlew assembleRelease bundleRelease

      - name: Build debug APK (PRs and unsigned fallback)
        if: env.KEYSTORE_PATH == ''
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload release APK
        if: env.KEYSTORE_PATH != ''
        uses: actions/upload-artifact@v4
        with:
          name: once-triplex-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload release AAB
        if: env.KEYSTORE_PATH != ''
        uses: actions/upload-artifact@v4
        with:
          name: once-triplex-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Upload debug APK
        if: env.KEYSTORE_PATH == ''
        uses: actions/upload-artifact@v4
        with:
          name: once-triplex-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

            
